tip);setTimeout(function(){tip.remove()},2000)}});/* ===== 文末赞赏面板 ===== */var spBox=document.createElement('div');spBox.style.cssText='margin-top:50px;text-align:center';var spBtn=document.createElement('button');spBtn.innerHTML='✨ 和作者无限进步';spBtn.style.cssText='padding:12px 28px;border-radius:30px;border:none;background:linear-gradient(90deg,#f0b429,#ff6b9d);color:#fff;font-weight:bold;font-size:15px;cursor:pointer;box-shadow:0 4px 15px rgba(240,180,41,0.3);transition:transform 0.3s';var qrP=document.createElement('div');qrP.innerHTML='<p style="font-size:13px;color:#888;margin:10px 0">无限进步，进步有你！</p><img src="https://raw.githubusercontent.com/luliy6/img/refs/heads/main/me.jpg" alt="赞赏码" style="width:180px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1)">';qrP.style.cssText='height:0;overflow:hidden;transition:height 0.4s ease,opacity 0.4s ease;opacity:0';spBtn.onmouseover=function(){spBtn.style.transform='translateY(-2px)'};spBtn.onmouseout=function(){spBtn.style.transform='none'};spBtn.onclick=function(){if(qrP.style.height==='0px'||!qrP.style.height){qrP.style.height='260px';qrP.style.opacity='1'}else{qrP.style.height='0px';qrP.style.opacity='0'}};spBox.appendChild(spBtn);spBox.appendChild(qrP);/* ===== 上一篇/下一篇 ===== */fetch('/postList.json').then(function(r){return r.json()}).then(function(posts){var cur=location.pathname.replace(/\/$/,'');var idx=posts.findIndex(function(p){return p.link&&p.link.replace(/\/$/,'')===cur});if(idx<0)return;var nav=document.createElement('div');nav.style.cssText='display:flex;justify-content:space-between;gap:16px;margin-top:40px;padding-top:20px;border-top:2px dashed rgba(9,105,218,0.2)';var prev=idx+1<posts.length?posts[idx+1]:null;var next=idx-1>=0?posts[idx-1]:null;function makeNavBtn(post,label,align){if(!post)return document.createElement('div');var a=document.createElement('a');a.href=post.link;a.style.cssText='flex:1;padding:14px 18px;border-radius:12px;background:rgba(9,105,218,0.05);border:1px solid rgba(9,105,218,0.15);text-decoration:none;transition:all 0.25s;text-align:'+align;a.innerHTML='<span style="display:block;font-size:11px;color:#888;margin-bottom:4px">'+label+'</span><span style="color:#0969da;font-weight:bold;font-size:14px">'+post.title+'</span>';a.onmouseover=function(){a.style.background='rgba(9,105,218,0.12)';a.style.transform='translateY(-2px)'};a.onmouseout=function(){a.style.background='rgba(9,105,218,0.05)';a.style.transform=''};return a}nav.appendChild(makeNavBtn(prev,'⬅ 上一篇','left'));nav.appendChild(makeNavBtn(next,'下一篇 ➡','right'));pbody.appendChild(nav)}).catch(function(){});pbody.appendChild(spBox);}/* ===== TOC 自动高亮 ===== */var tocTimer=null;function initTOCHighlight(){var heads=Array.from(document.querySelectorAll('#postBody h2,#postBody h3'));if(!heads.length)return;window.addEventListener('scroll',function(){if(tocTimer)clearTimeout(tocTimer);tocTimer=setTimeout(function(){var scrollY=window.scrollY||document.documentElement.scrollTop;var cur=null;heads.forEach(function(h){if(scrollY>=h.offsetTop-120)cur=h});var tocLinks=document.querySelectorAll('.toc a,.markdown-toc a,[class*="toc"] a');tocLinks.forEach(function(a){var href=a.getAttribute('href');var matched=cur&&href&&href==='#'+cur.id;a.style.color=matched?'#f0b429':'';a.style.fontWeight=matched?'bold':'';a.style.transition='color 0.2s'})},50)})}setTimeout(initTOCHighlight,800);/* ===== 动态网页标题 ===== */var oriT=document.title;var tTime;document.addEventListener('visibilitychange',function(){if(document.hidden){document.title='👀 别走呀，我还在进步！';clearTimeout(tTime)}else{document.title='✨ 欢迎回来！ '+oriT;tTime=setTimeout(function(){document.title=oriT},2000)}});/* ===== 运行时间（居中，仅秒红色） ===== */var upE=document.createElement('div');upE.style.cssText='text-align:center;font-size:13px;color:#888;padding:10px 0;margin-top:20px';document.body.appendChild(upE);var stDate=new Date('2026/05/30 00:00:00').getTime();function updateUptime(){var n=Date.now();var d=n-stDate;if(d<0){upE.innerHTML='🚀 博客即将上线，敬请期待...';return}var days=Math.floor(d/86400000);var hh=Math.floor((d%86400000)/3600000);var mm=Math.floor((d%3600000)/60000);var ss=Math.floor((d%60000)/1000);upE.innerHTML='🌱 本站已陪伴你无限进步：'+days+'天 '+hh+'小时 '+mm+'分 <span style="color:#ff4444;font-weight:bold;font-family:monospace">'+ss+'</span>秒'}updateUptime();setInterval(updateUptime,1000);/* ===== 首页公告栏 ===== */var m=document.querySelector('.container-lg');if(m){var a=document.createElement('div');a.className='announce-bar';a.innerHTML='📢 欢迎来到 Luliy 的博客！—— 记录点滴，我将无限进步！';m.insertBefore(a,m.firstChild)}/* ===== Hero 区 ===== */var hero=document.createElement('div');hero.id='site-hero';hero.innerHTML='<div style="text-align:center;padding:56px 20px 40px;background:linear-gradient(135deg,#0d1b2a 0%,#1a2a4a 40%,#8250df 100%);border-radius:18px;margin-bottom:32px;position:relative;overflow:hidden"><div style="position:absolute;inset:0;background:url(\"data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%23ffffff\' fill-opacity=\'0.04\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E\") repeat;opacity:0.6"></div><h1 style="font-size:3rem;font-weight:900;color:#fff;margin:0 0 12px;letter-spacing:2px;position:relative;text-shadow:0 4px 20px rgba(0,0,0,0.4)">✦ Luliy ✦</h1><p style="font-size:1.1rem;color:rgba(255,255,255,0.8);margin:0 0 28px;position:relative;letter-spacing:1px">我将无限进步 · 记录点滴 · 持续成长</p><a href="#post-list" style="display:inline-block;padding:12px 32px;background:linear-gradient(90deg,#f0b429,#ff6b9d);color:#fff;font-weight:bold;border-radius:30px;text-decoration:none;font-size:15px;position:relative;box-shadow:0 4px 20px rgba(240,180,41,0.4);transition:transform 0.2s" onmouseover="this.style.transform=\'translateY(-2px)\'" onmouseout="this.style.transform=\'\'">🚀 开始阅读</a></div>';if(m)m.insertBefore(hero,m.children[1]||m.firstChild);/* ===== 时钟嵌入Hero（时分） ===== */var heroClock=document.createElement('div');heroClock.id='hero-clock';heroClock.style.cssText='font-size:26px;color:#ff4444;font-weight:bold;font-family:monospace;margin-bottom:18px;letter-spacing:4px;text-shadow:0 2px 8px rgba(255,68,68,0.4)';function updateClock(){var now=new Date();var h=String(now.getHours()).padStart(2,'0');var mi=String(now.getMinutes()).padStart(2,'0');heroClock.textContent=h+':'+mi}updateClock();setInterval(updateClock,1000);var heroInner=document.querySelector('#site-hero div');if(heroInner){var h1el=heroInner.querySelector('h1');if(h1el)heroInner.insertBefore(heroClock,h1el)}/* ===== 一言（hitokoto） ===== */var hBox=document.createElement('div');hBox.className='hitokoto-bar';hBox.textContent='正在加载今日一言...';if(m)m.insertBefore(hBox,document.getElementById('site-hero').nextSibling);fetch('https://v1.hitokoto.cn/?c=b&c=d&c=h&c=i&c=k&encode=json').then(function(r){return r.json()}).then(function(d){hBox.textContent=d.hitokoto+(d.from?'  ——《'+d.from+'》':'')}).catch(function(){hBox.textContent='每一天都是新的进步 🌱'});/* ===== 头像点击跳转 ===== */var av=document.querySelector('.avatar');if(av){av.style.cursor='pointer';av.onclick=function(){window.location.href='/about.html'}}/* ===== 文章列表动画 + 日期图标 + 封面占位符（无异步缩略图） ===== */var postList=document.querySelector('.post-list')||document.querySelector('.postList');if(postList)postList.id='post-list';var gradients=['linear-gradient(135deg,#8250df,#f0b429)','linear-gradient(135deg,#0969da,#34d399)','linear-gradient(135deg,#ff6b9d,#ffcd3c)','linear-gradient(135deg,#6bceff,#8250df)','linear-gradient(135deg,#34d399,#0969da)','linear-gradient(135deg,#f0b429,#ff6b9d)'];var items=document.querySelectorAll('.post-item');items.forEach(function(el,i){el.style.animationDelay=(i*0.07)+'s';var d=el.querySelector('span.color-fg-muted');if(d&&!d.innerHTML.includes('📅')){d.innerHTML='📅 '+d.innerHTML}var inner=document.createElement('div');inner.className='post-item-body';while(el.firstChild){inner.appendChild(el.firstChild)}var thumb=document.createElement('div');thumb.className='post-item-thumb-placeholder';thumb.style.cssText='width:100%;height:160px;border-radius:10px 10px 0 0;display:block;background:'+gradients[i%gradients.length]+';position:relative;overflow:hidden';var thumbEmoji=document.createElement('span');thumbEmoji.textContent=['✨','🚀','📖','💡','🌱','🎯','🔥','💎'][i%8];thumbEmoji.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;opacity:0.5';thumb.appendChild(thumbEmoji);el.appendChild(thumb);el.appendChild(inner)});/* ===== 年度归档时间轴（archive页） ===== */if(location.pathname.includes('archive')){var pb=document.getElementById('postBody');if(pb){pb.innerHTML='<p style="color:#888;font-size:14px">正在加载归档...</p>';fetch('/postList.json').then(function(r){return r.json()}).then(function(posts){var byYear={};posts.forEach(function(p){var y=p.created?p.created.slice(0,4):(p.date?p.date.slice(0,4):'未知');if(!byYear[y])byYear[y]=[];byYear[y].push(p)});var years=Object.keys(byYear).sort(function(a,b){return b-a});var html='<h1 style="color:#0969da;border-bottom:2px solid #0969da;padding-bottom:10px;margin-bottom:30px">📅 文章归档</h1>';years.forEach(function(y){html+='<div class="tl-year">'+y+' 年</div><ul class="tl-list">';byYear[y].forEach(function(p){var dateStr=p.created||p.date||'';var md=dateStr.slice(5,10).replace('-','/');html+='<li class="tl-item"><a href="'+p.link+'">'+p.title+'</a><span class="tl-date">'+md+'</span></li>'});html+='</ul>'});pb.innerHTML=html}).catch(function(){pb.innerHTML='<p style="color:#e74c3c">归档加载失败，请刷新重试</p>'})}}});</script>

  <style>

<script>
(() => {
  'use strict';

  const START = new Date('2026-05-12T00:00:00');
  const EXAM = new Date('2026-06-13T09:00:00');
  const TOTAL_DAYS = 32;
  const STORE = 'cet4_survival_dashboard_v2';
  const YOUDAO = 'http://m.youdao.com/dict?le=eng&q=';

  const syntaxPrompt = `Role: The Syntax Deep Dive Master

Profile & Objective

You are a Senior English Teacher and Language Analyst with over 20 years of experience. Your pedagogical approach focuses on patience, systematic breakdown, and structural logic.

Your Goal: To deconstruct complex English syntactic structures (S-V-O, clauses, modification chains) for beginners/intermediate learners. You do not just translate; you help the student internalize the logic of the language.

Core Execution Framework

The user will provide learning material (a single sentence or a full article/paragraph). You must automatically and strictly execute one of the following two modes based on the input.

Mode 1: Single Sentence Deep Dive

Trigger: User inputs a single sentence.

Execution: You must follow these phases sequentially.

Phase 1: Morphological Segmentation (Table Driven)

1. Deconstruct: Break the sentence down into its smallest meaningful units (morphemes, words, or key phrases).
2. Format: Present these units in a Markdown Table.
3. Pre-requisite Check: After displaying the table, you must immediately ask: “请您确认，表格中的所有词素/短语您是否都已完全理解？请回复‘是’或‘否’，以便我们继续。”
4. Hold: Do not proceed to Phase 2 until the user replies ‘Yes’ (是).

Phase 2: Lexical Depth & Expansion

For every unit listed in Phase 1:

1. Definition: Provide a concise definition in Simplified Chinese.
2. Synonyms: List 1-2 common synonyms with Chinese meanings.
3. Etymology (Conditional): For complex words unfamiliar to beginners, analyze the etymology (roots/prefixes/suffixes) and provide 1 practical example sentence to reinforce understanding.

Phase 3: Syntax & Structural Logic

1. Structure Analysis: Analyze the main structure (e.g., Subject-Verb-Object), clause types, non-finite verbs, and modifiers.
2. Pedagogical Explanation: Using extremely simple and accessible language, explain how the sentence is constructed logically from a beginner’s perspective.
3. Translation: Provide a smooth, accurate, and natural Chinese translation.

Phase 4: Pattern Internalization & Practice

1. Summary: Extract the Core Grammatical Pattern (e.g., “It is… that” emphasis, or Non-restrictive Relative Clause).
2. Practice: Generate 3 NEW example sentences that strictly follow this core pattern but use different vocabulary/topics.
3. Translation: Provide Chinese translations for these 3 new examples.

Mode 2: Textual Structure Analysis

Trigger: User inputs text longer than one sentence (paragraph or article).

Execution: Use the Sentence-by-Sentence Confirmation method.

1. Present & Ask: Display only the next sentence of the text.
2. Interaction: Immediately ask: “这是下一句话。您完全理解这句话的结构和含义吗？请回复‘是’或‘否’。”
3. Conditional Logic:

- If User says ‘No’ (否): Immediately execute Mode 1 (Phases 1-4) for this specific sentence. Once done, ask to proceed.
- If User says ‘Yes’ (是): Skip analysis and proceed directly to the next sentence.

4. Loop: Repeat until the entire text is finished.

Constraints & Formatting

1. Language Requirement: All explanations, definitions, interactions, and teaching content MUST BE in Simplified Chinese.
2. English Text Format: All English words, phrases, and sentences must be in Plain Text for easy copying.
3. Table Format: Phase 1 segmentation must use Markdown tables.
4. Tone: Encouraging, detailed, professional, and highly organized.
5. No LaTeX: Do not use LaTeX formatting for standard text unless absolutely necessary.

Start Protocol

Hello! I am honored to be your “Syntax Deep Dive Master.”

To begin our structural analysis course, please provide the English sentence or article/paragraph you wish to analyze. I will automatically switch to the appropriate teaching mode based on your input.`;

  const wordBank = `ability,absence,academic,accept,access,accident,account,accurate,achieve,acquire,activity,actual,adapt,addition,address,adequate,adjust,advantage,advertise,affect,afford,agency,agree,agriculture,allow,alternative,analysis,announce,anxiety,apartment,apologize,approach,appropriate,argue,arrange,article,aspect,assign,assist,assume,atmosphere,attempt,attitude,available,average,avoid,aware,balance,benefit,budget,campus,cancel,career,challenge,channel,character,charge,civil,claim,climate,combine,comfort,comment,commercial,commit,common,community,compare,compete,complex,concern,condition,conduct,confirm,conflict,constant,consume,contact,contain,context,contract,contribute,control,convenient,cooperate,copy,corporate,creative,credit,culture,curious,current,damage,data,debate,decade,decline,define,degree,deliver,demand,depend,describe,design,desire,detail,determine,develop,device,diet,difference,difficulty,digital,direction,discuss,disease,distance,distinct,distribute,document,domestic,economy,educate,effective,effort,efficient,electronic,element,emergency,emotion,emphasis,employee,enable,encourage,energy,engage,engineer,enhance,enormous,environment,equal,equipment,especially,essential,establish,evaluate,eventually,evidence,exact,examine,example,exchange,exercise,expand,expect,expense,experience,experiment,expert,explain,explore,express,extend,facility,factor,failure,familiar,feature,finance,flexible,focus,foreign,formal,former,frequent,function,generate,global,graduate,guarantee,habit,handle,healthy,identity,ignore,impact,imply,improve,income,increase,indicate,individual,industry,influence,inform,initial,injury,innovation,instance,instead,institute,instruction,intelligent,intention,interaction,interest,international,interpret,interview,involve,issue,journal,knowledge,labor,lack,legal,leisure,likely,limit,literature,local,logical,maintain,major,manage,market,material,measure,media,medical,mental,method,minor,modern,monitor,motivate,nation,natural,necessary,negative,network,normal,observe,obtain,obvious,occur,offer,official,operate,opinion,opportunity,option,ordinary,organize,original,overall,participate,particular,passage,patient,pattern,perform,period,permit,personal,physical,policy,population,positive,potential,practical,prefer,prepare,pressure,previous,principle,priority,private,process,produce,professional,progress,project,promote,proper,protect,provide,purpose,quality,quantity,range,rare,react,realize,reason,recommend,reduce,reflect,region,regular,relation,release,reliable,remain,replace,require,research,resource,respond,responsible,result,review,risk,role,security,select,senior,series,significant,similar,situation,skill,social,solution,specific,standard,strategy,structure,subject,success,suggest,supply,support,survey,system,technology,temporary,theory,therefore,tradition,transfer,transport,typical,unique,urban,value,variety,vehicle,version,view,volunteer,welfare,whereas,willing`.split(',');

  const synonymBank = [
    ['important','significant','重要的'],['common','ordinary','常见的'],['help','assist','帮助'],['use','utilize','使用'],['improve','enhance','提高'],
    ['problem','issue','问题'],['method','approach','方法'],['show','indicate','表明'],['cause','lead to','导致'],['enough','adequate','足够的'],
    ['fast','rapid','快速的'],['big','enormous','巨大的'],['good','beneficial','有益的'],['bad','negative','负面的'],['clear','obvious','明显的'],
    ['buy','purchase','购买'],['start','begin','开始'],['end','finish','结束'],['need','require','需要'],['choose','select','选择'],
    ['think','consider','考虑'],['build','establish','建立'],['keep','maintain','保持'],['get','obtain','获得'],['job','career','职业'],
    ['chance','opportunity','机会'],['goal','objective','目标'],['answer','solution','解决办法'],['many','numerous','许多的'],['hard','difficult','困难的']

  const phraseBank = [
    ['as a result','因此'],['be aware of','意识到'],['take advantage of','利用'],['make progress','取得进步'],['pay attention to','注意'],
    ['in my opinion','在我看来'],['on the one hand','一方面'],['on the other hand','另一方面'],['deal with','处理'],['focus on','专注于'],
    ['be responsible for','对……负责'],['have an impact on','对……有影响'],['in addition','此外'],['for example','例如'],['according to','根据'],
    ['depend on','依赖'],['be likely to','可能'],['lead to','导致'],['contribute to','有助于'],['take part in','参加'],
    ['keep a balance','保持平衡'],['in the long run','从长远看'],['make full use of','充分利用'],['be different from','不同于'],['prepare for','为……做准备'],
    ['be related to','与……有关'],['in order to','为了'],['rather than','而不是'],['as far as I am concerned','就我而言'],['play an important role in','在……中起重要作用']
  ];

  const longSentences = [
    'Although many students believe that vocabulary is the most difficult part of the CET-4 exam, the real challenge often lies in understanding how simple words are connected to form complex meanings.',
    'What matters most during the final month is not how many books a learner buys, but whether he or she can review mistakes regularly and turn weak points into stable scoring habits.',

  ];

  const templates = [
    {
      name:'现象解释型',
      text:`Nowadays, more and more people pay attention to ______. This phenomenon has caused wide discussion among students and teachers.

There are several reasons for it. First, ______ has become increasingly important in our daily life. Second, many people realize that ______ can bring practical benefits. Finally, social development also encourages us to ______.

In my opinion, we should look at this phenomenon in a positive and reasonable way. If we can make good use of it and avoid possible problems, it will surely help us improve ourselves.`
    },
    {
      name:'观点对比型',
      text:`When it comes to ______, different people hold different opinions. Some people believe that ______ is useful and necessary, while others argue that it may bring pressure or waste time.

Those who support it think that ______ can help people gain knowledge, improve efficiency and develop good habits. However, opponents worry that ______ may lead to dependence or unnecessary competition.

As far as I am concerned, both sides have reasonable points. We should not accept or reject it blindly. The best choice is to use it properly according to our own needs.`
    },
    {
      name:'图表描述型',
      text:`As is clearly shown in the chart, the number/percentage of ______ has changed greatly in recent years. It rises/falls from ______ to ______, which shows an obvious trend.

Several factors may explain this change. To begin with, ______ plays an important role. In addition, people’s awareness of ______ has also increased. What is more, the development of society provides more chances for ______.

From the data, we can conclude that ______ will remain important in the future. Therefore, we should take effective measures to adapt to this trend.`
    }
  ];

  const tenses = ['一般现在时','一般过去时','一般将来时','现在进行时','过去进行时','现在完成时','过去完成时','将来完成时'];

  let state = loadState();
  let activeTab = 0;
  let selectedDay = getTodayIndex();
  let countdownTimer = null;

  function loadState(){
    const base = {completed:{}, notes:{}, editTime:{}, theme:'dark'};
    try {
      return Object.assign(base, JSON.parse(localStorage.getItem(STORE) || '{}'));
    } catch {
      return base;
    }
  }

  function saveState(){
    localStorage.setItem(STORE, JSON.stringify(state));
  }

  function dayDate(i){
    const d = new Date(START);
    d.setDate(START.getDate() + i - 1);
    return d;
  }

  function fmtDate(d){
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function cnDate(d){
    return `${d.getMonth()+1}月${d.getDate()}日`;
  }

  function getTodayIndex(){
    const diff = Math.floor((nowFixed - START) / 86400000) + 1;
    return Math.min(Math.max(diff,1),TOTAL_DAYS);
  }

  function statusOf(i){
    if(state.completed[i]) return '已完成';
    if(i === getTodayIndex()) return '学习中';
    return '未开始';
  }

  function completedCount(){
    return Object.keys(state.completed).filter(k => state.completed[k]).length;
  }

  function streak(){
    let s = 0;
    for(let i = getTodayIndex(); i >= 1; i--){
      if(state.completed[i]) s++;
      else break;
    }
    return s;
  }

  function esc(s=''){
    return String(s).replace(/[&<>"']/g, m => ({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;',
      "'":'&#039;'
    }[m]));
  }

  function toast(msg){
    const el = document.createElement('div');
    el.className = 'fixed top-5 left-1/2 -translate-x-1/2 z-[80] glass rounded-full px-5 py-3 font-bold shadow-glow fade';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => {
      el.style.opacity = '0';
      el.style.transform = 'translate(-50%,-10px)';
    }, 1500);
    setTimeout(() => el.remove(), 1900);
  }

  async function copyText(text,msg='已复制'){
    try{
      await navigator.clipboard.writeText(text);
      toast(msg);
    }catch{
      toast('复制失败，请手动选择文本');
    }
  }

  function openLink(url){
    window.open(url,'_blank','noopener,noreferrer');
  }

  function getWords(i){
    const start = ((i-1)*37) % wordBank.length;
    return Array.from({length:75},(_,k) => wordBank[(start+k) % wordBank.length]);
  }

  function getSyns(i){
    const start = ((i-1)*3) % synonymBank.length;
    return Array.from({length:10},(_,k) => synonymBank[(start+k) % synonymBank.length]);
  }

  function getPhrases(i){
    const start = ((i-1)*4) % phraseBank.length;
    return Array.from({length:10},(_,k) => phraseBank[(start+k) % phraseBank.length]);
  }

  function getReviews(i){
    const intervals = [1,2,4,7,15,30];
    return intervals
      .map(n => i - n)
      .filter(x => x >= 1)
      .map(x => `Day ${x}（${cnDate(dayDate(x))}）`);
  }

  function getArticle(i){
    const tense = tenses[(i-1) % tenses.length];
    const topic = ['learning habits','campus reading','online classes','healthy sleep','public libraries','city transport','volunteer work','digital tools'][i % 8];
    return {

  function startCountdown(){
    if(countdownTimer) clearInterval(countdownTimer);

    const tick = () => {
      let ms = Math.max(0, EXAM - new Date());
      const d = Math.floor(ms / 86400000);
      ms %= 86400000;
      const h = Math.floor(ms / 3600000);
      ms %= 3600000;
      const m = Math.floor(ms / 60000);
      ms %= 60000;
      const s = Math.floor(ms / 1000);

      cdDay.textContent = d;
      cdHour.textContent = String(h).padStart(2,'0');
      cdMin.textContent = String(m).padStart(2,'0');
      cdSec.textContent = String(s).padStart(2,'0');
    };

    tick();
    countdownTimer = setInterval(tick,1000);
  }

  function download(name,text){

    a.click();

        activeTab = 1;
        selectedDay = getTodayIndex();
        render();
      }

      const ds = e.target.closest('.daySelect,.calDay');
      if(ds){
        selectedDay = +ds.dataset.day;
        activeTab = ds.classList.contains('calDay') ? 1 : activeTab;
        render();
      }

      if(e.target.id === 'completeBtn'){
        state.completed[selectedDay] = !state.completed[selectedDay];
        saveState();
        updateHeader();
        render();
        toast(state.completed[selectedDay] ? '打卡完成，进度已更新' : '已取消打卡');
      }

      if(e.target.id === 'saveNote'){
        saveNote();
      }

      if(e.target.classList.contains('copySentence')){
        copyText(getPlan(selectedDay).sentence,'长难句已复制');
      }

      if(e.target.id === 'exportDay'){
        exportDay(selectedDay);
      }

      if(e.target.id === 'exportAll'){
        exportAll();
      }

      const jp = e.target.closest('.jumpPlan');
      if(jp){
        selectedDay = +jp.dataset.day;
        activeTab = 1;
        render();
      }
    };

    view.oninput = (e) => {
      if(e.target.id === 'noteArea'){
        clearTimeout(window.noteTimer);
        window.noteTimer = setTimeout(saveNote,500);
      }

      if(e.target.id === 'searchNotes'){
        window.recordQuery = e.target.value;
        renderRecords();
      }
    };

    view.onchange = (e) => {
      if(e.target.id === 'filterNotes'){
        window.recordFilter = e.target.value;
        renderRecords();
      }
    };
  }

  function render(){
    updateHeader();

    document.querySelectorAll('.navBtn').forEach(b => {
      b.className = 'navBtn px-4 py-3 rounded-full text-sm font-bold whitespace-nowrap tap ' + (+b.dataset.tab === activeTab ? 'bg-white/20 shadow-glow' : 'hover:bg-white/10');
    });

    if(activeTab === 0) renderOverview();
    if(activeTab === 1) renderPlan();
    if(activeTab === 2) renderMock();
    if(activeTab === 3) renderRecords();
  }

  applyTheme();
  bindEvents();
  startCountdown();
  render();
})();
</script>
</body>
</html>

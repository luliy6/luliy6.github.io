letter-spacing:4px;text-shadow:0 2px 8px rgba(255,68,68,0.4)';function updateClock(){var now=new Date();var h=String(now.getHours()).padStart(2,'0');var mi=String(now.getMinutes()).padStart(2,'0');heroClock.textContent=h+':'+mi}updateClock();setInterval(updateClock,1000);var heroInner=document.querySelector('#site-hero div');if(heroInner){var h1el=heroInner.querySelector('h1');if(h1el)heroInner.insertBefore(heroClock,h1el)}/* ===== 一言（hitokoto） ===== */var hBox=document.createElement('div');hBox.className='hitokoto-bar';hBox.textContent='正在加载今日一言...';if(m)m.insertBefore(hBox,document.getElementById('site-hero').nextSibling);fetch('https://v1.hitokoto.cn/?c=b&c=d&c=h&c=i&c=k&encode=json').then(function(r){return r.json()}).then(function(d){hBox.textContent=d.hitokoto+(d.from?'  ——《'+d.from+'》':'')}).catch(function(){hBox.textContent='每一天都是新的进步 🌱'});/* ===== 头像点击跳转 ===== */var av=document.querySelector('.avatar');if(av){av.style.cursor='pointer';av.onclick=function(){window.location.href='/about.html'}}/* ===== 文章列表动画 + 日期图标 + 封面缩略图 ===== */var postList=document.querySelector('.post-list')||document.querySelector('.postList');if(postList)postList.id='post-list';var gradients=['linear-gradient(135deg,#8250df,#f0b429)','linear-gradient(135deg,#0969da,#34d399)','linear-gradient(135deg,#ff6b9d,#ffcd3c)','linear-gradient(135deg,#6bceff,#8250df)','linear-gradient(135deg,#34d399,#0969da)','linear-gradient(135deg,#f0b429,#ff6b9d)'];var items=document.querySelectorAll('.post-item');items.forEach(function(el,i){el.style.animationDelay=(i*0.07)+'s';var d=el.querySelector('span.color-fg-muted');if(d&&!d.innerHTML.includes('📅')){d.innerHTML='📅 '+d.innerHTML}var inner=document.createElement('div');inner.className='post-item-body';while(el.firstChild){inner.appendChild(el.firstChild)}var titleLink=inner.querySelector('a[href]');var thumb=document.createElement('div');thumb.className='post-item-thumb-placeholder';thumb.style.cssText='width:100%;height:160px;border-radius:10px 10px 0 0;display:block;background:'+gradients[i%gradients.length]+';position:relative;overflow:hidden';var thumbEmoji=document.createElement('span');thumbEmoji.textContent=['✨','🚀','📖','💡','🌱','🎯','🔥','💎'][i%8];thumbEmoji.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;opacity:0.5';thumb.appendChild(thumbEmoji);el.appendChild(thumb);el.appendChild(inner);if(titleLink){(function(link,thumbEl){fetch(link.href).then(function(r){return r.text()}).then(function(html){var doc=new DOMParser().parseFromString(html,'text/html');var img=doc.querySelector('#postBody img');if(img&&img.src){var realImg=document.createElement('img');realImg.src=img.src;realImg.className='post-item-thumb';realImg.style.cssText='width:100%;height:160px;object-fit:cover;border-radius:10px 10px 0 0;display:block';realImg.onload=function(){thumbEl.replaceWith(realImg)};realImg.onerror=function(){}}}). catch(function(){})})(titleLink,thumb)}});/* ===== 副标题打字机 ===== */var el=document.querySelector('.blogTitle p')||document.querySelector('p.f4');if(el){var txt=el.textContent;el.textContent='';var i=0;(function type(){if(i<txt.length){el.textContent+=txt[i++];setTimeout(type,60)}})()}/* ===== 樱花飘落特效 ===== */var canvas=document.createElement('canvas');canvas.id='petals-canvas';document.body.appendChild(canvas);var ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;window.addEventListener('resize',function(){canvas.width=window.innerWidth;canvas.height=window.innerHeight});var petals=[];for(var p=0;p<38;p++){petals.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*7+4,speed:Math.random()*1.2+0.4,drift:Math.random()*0.8-0.4,opacity:Math.random()*0.5+0.3,color:Math.random()>0.5?'#ffb7c5':'#fff'})}var petalRunning=false;var petalRAF=null;canvas.style.display='none';function drawPetal(p){ctx.save();ctx.globalAlpha=p.opacity;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();ctx.restore()}function animatePetals(){if(!petalRunning)return;ctx.clearRect(0,0,canvas.width,canvas.height);petals.forEach(function(p){drawPetal(p);p.y+=p.speed;p.x+=p.drift;if(p.y>canvas.height+10){p.y=-10;p.x=Math.random()*canvas.width}});petalRAF=requestAnimationFrame(animatePetals)}/* ===== ✨ 开关特效按钮（纯图标） ===== */var fxBtn=document.createElement('button');fxBtn.textContent='✨';fxBtn.title='开/关樱花特效';fxBtn.style.cssText='position:fixed;bottom:24px;left:16px;padding:0;border:none;background:none;font-size:24px;cursor:pointer;z-index:9999;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));transition:transform 0.2s,filter 0.2s';fxBtn.onmouseover=function(){fxBtn.style.transform='scale(1.3)'};fxBtn.onmouseout=function(){fxBtn.style.transform='scale(1)'};document.body.appendChild(fxBtn);fxBtn.onclick=function(){if(petalRunning){petalRunning=false;if(petalRAF)cancelAnimationFrame(petalRAF);ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none';fxBtn.style.filter='drop-shadow(0 2px 4px rgba(0,0,0,0.3)) grayscale(1)'}else{canvas.style.display='';petalRunning=true;animatePetals();fxBtn.style.filter='drop-shadow(0 2px 4px rgba(0,0,0,0.3))'}};/* ===== 点击粒子特效 ===== */document.addEventListener('click',function(e){for(var b=0;b<18;b++){var spark=document.createElement('div');var angle=Math.random()*360;var dist=Math.random()*60+20;var colors=['#ff6b9d','#ffcd3c','#6bceff','#a78bfa','#34d399'];spark.style.cssText='position:fixed;left:'+e.clientX+'px;top:'+e.clientY+'px;width:7px;height:7px;border-radius:50%;background:'+colors[Math.floor(Math.random()*colors.length)]+';pointer-events:none;z-index:9999;transition:transform 0.6s ease,opacity 0.6s ease;transform:translate(-50%,-50%)';document.body.appendChild(spark);setTimeout(function(s,a,d){s.style.transform='translate(calc(-50% + '+Math.cos(a*Math.PI/180)*d+'px),calc(-50% + '+Math.sin(a*Math.PI/180)*d+'px))';s.style.opacity='0'})(spark,angle,dist,0);setTimeout(function(s){s.remove()}(spark),700)}});/* ===== 彩带纸屑 ===== */var confettiCount=120;var confettiArr=[];var confettiCanvas=document.createElement('canvas');confettiCanvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10000';confettiCanvas.width=window.innerWidth;confettiCanvas.height=window.innerHeight;document.body.appendChild(confettiCanvas);var cctx=confettiCanvas.getContext('2d');var confettiColors=['#ff6b9d','#ffcd3c','#6bceff','#a78bfa','#34d399','#ff9a3c','#f06'];for(var ci=0;ci<confettiCount;ci++){confettiArr.push({x:Math.random()*confettiCanvas.width,y:-20-Math.random()*confettiCanvas.height*0.5,w:Math.random()*12+4,h:Math.random()*6+3,color:confettiColors[Math.floor(Math.random()*confettiColors.length)],speed:Math.random()*4+2,drift:Math.random()*3-1.5,rot:Math.random()*360,rotSpeed:Math.random()*6-3,opacity:1})}var confettiDone=false;function drawConfetti(){if(confettiDone){cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);confettiCanvas.remove();return}cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);var allOut=true;confettiArr.forEach(function(c){if(c.y<confettiCanvas.height+20)allOut=false;cctx.save();cctx.globalAlpha=Math.max(0,c.opacity);cctx.translate(c.x,c.y);cctx.rotate(c.rot*Math.PI/180);cctx.fillStyle=c.color;cctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);cctx.restore();c.y+=c.speed;c.x+=c.drift;c.rot+=c.rotSpeed;if(c.y>confettiCanvas.height*0.7)c.opacity-=0.02});if(allOut)confettiDone=true;requestAnimationFrame(drawConfetti)}drawConfetti();/* ===== 年度归档时间轴（archive页） ===== */if(location.pathname.includes('archive')){var pb=document.getElementById('postBody');if(pb){pb.innerHTML='<p style="color:#888;font-size:14px">正在加载归档...</p>';fetch('/postList.json').then(function(r){return r.json()}).then(function(posts){var byYear={};posts.forEach(function(p){var y=p.created?p.created.slice(0,4):(p.date?p.date.slice(0,4):'未知');if(!byYear[y])byYear[y]=[];byYear[y].push(p)});var years=Object.keys(byYear).sort(function(a,b){return b-a});var html='<h1 style="color:#0969da;border-bottom:2px solid #0969da;padding-bottom:10px;margin-bottom:30px">📅 文章归档</h1>';years.forEach(function(y){html+='<div class="tl-year">'+y+' 年</div><ul class="tl-list">';byYear[y].forEach(function(p){var dateStr=p.created||p.date||'';var md=dateStr.slice(5,10).replace('-','/');html+='<li class="tl-item"><a href="'+p.link+'">'+p.title+'</a><span class="tl-date">'+md+'</span></li>'});html+='</ul>'});pb.innerHTML=html}).catch(function(){pb.innerHTML='<p style="color:#e74c3c">归档加载失败，请刷新重试</p>'})}}}); </script>

<script>document.addEventListener('DOMContentLoaded',function(){/* ===== 公告栏 ===== */var m=document.querySelector('.container-lg');if(m){var a=document.createElement('div');a.className='announce-bar';a.innerHTML='📢 欢迎来到 Luliy 的博客！—— 记录点滴，我将无限进步！';m.insertBefore(a,m.firstChild)}/* ===== 头像点击跳转 ===== */var av=document.querySelector('.avatar');if(av){av.style.cursor='pointer';av.onclick=function(){window.location.href='/about.html'}}/* ===== 文章列表动画 + 日期图标 ===== */var items=document.querySelectorAll('.post-item');items.forEach(function(el,i){el.style.animationDelay=(i*0.07)+'s';var d=el.querySelector('span.color-fg-muted');if(d&&!d.innerHTML.includes('📅')){d.innerHTML='📅 '+d.innerHTML}});/* ===== 副标题打字机 ===== */var el=document.querySelector('.blogTitle p')||document.querySelector('p.f4');if(el){var txt=el.textContent;el.textContent='';var i=0;(function type(){if(i<txt.length){el.textContent+=txt[i++];setTimeout(type,60)}})()}/* ===== 樱花飘落特效 canvas ===== */var canvas=document.createElement('canvas');canvas.id='petals-canvas';document.body.appendChild(canvas);var ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;window.addEventListener('resize',function(){canvas.width=window.innerWidth;canvas.height=window.innerHeight});var petals=[];for(var p=0;p<38;p++){petals.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*7+4,speed:Math.random()*1.2+0.4,drift:Math.random()*0.8-0.4,opacity:Math.random()*0.5+0.3,color:Math.random()>0.5?'#ffb7c5':'#fff'})}var petalRunning=true;var petalRAF=null;function drawPetal(p){ctx.save();ctx.globalAlpha=p.opacity;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();ctx.restore()}function animatePetals(){if(!petalRunning)return;ctx.clearRect(0,0,canvas.width,canvas.height);petals.forEach(function(p){drawPetal(p);p.y+=p.speed;p.x+=p.drift;if(p.y>canvas.height+10){p.y=-10;p.x=Math.random()*canvas.width}});petalRAF=requestAnimationFrame(animatePetals)}animatePetals();/* ===== ✨ 开关特效按钮 ===== */var fxBtn=document.createElement('button');fxBtn.textContent='✨ 关特效';fxBtn.style.cssText='position:fixed;bottom:24px;left:16px;padding:8px 14px;border-radius:20px;border:none;background:#8250df;color:#fff;font-size:13px;cursor:pointer;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,0.2)';document.body.appendChild(fxBtn);fxBtn.onclick=function(){if(petalRunning){petalRunning=false;if(petalRAF)cancelAnimationFrame(petalRAF);ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none';fxBtn.textContent='✨ 开特效'}else{canvas.style.display='';petalRunning=true;animatePetals();fxBtn.textContent='✨ 关特效'}};/* ===== 点击粒子特效 ===== */document.addEventListener('click',function(e){for(var b=0;b<18;b++){var spark=document.createElement('div');var angle=Math.random()*360;var dist=Math.random()*60+20;var colors=['#ff6b9d','#ffcd3c','#6bceff','#a78bfa','#34d399'];spark.style.cssText='position:fixed;left:'+e.clientX+'px;top:'+e.clientY+'px;width:7px;height:7px;border-radius:50%;background:'+colors[Math.floor(Math.random()*colors.length)]+';pointer-events:none;z-index:9999;transition:transform 0.6s ease,opacity 0.6s ease;transform:translate(-50%,-50%)';document.body.appendChild(spark);setTimeout(function(s,a,d){s.style.transform='translate(calc(-50% + '+Math.cos(a*Math.PI/180)*d+'px),calc(-50% + '+Math.sin(a*Math.PI/180)*d+'px))';s.style.opacity='0'})(spark,angle,dist,0);setTimeout(function(s){s.remove()}(spark),700)}});/* ===== 彩带/纸屑爆炸（进入页面触发一次） ===== */var confettiCount=120;var confettiArr=[];var confettiCanvas=document.createElement('canvas');confettiCanvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10000';confettiCanvas.width=window.innerWidth;confettiCanvas.height=window.innerHeight;document.body.appendChild(confettiCanvas);var cctx=confettiCanvas.getContext('2d');var confettiColors=['#ff6b9d','#ffcd3c','#6bceff','#a78bfa','#34d399','#ff9a3c','#f06'];for(var ci=0;ci<confettiCount;ci++){confettiArr.push({x:Math.random()*confettiCanvas.width,y:-20-Math.random()*confettiCanvas.height*0.5,w:Math.random()*12+4,h:Math.random()*6+3,color:confettiColors[Math.floor(Math.random()*confettiColors.length)],speed:Math.random()*4+2,drift:Math.random()*3-1.5,rot:Math.random()*360,rotSpeed:Math.random()*6-3,opacity:1})}var confettiDone=false;function drawConfetti(){if(confettiDone){cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);confettiCanvas.remove();return}cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);var allOut=true;confettiArr.forEach(function(c){if(c.y<confettiCanvas.height+20)allOut=false;cctx.save();cctx.globalAlpha=Math.max(0,c.opacity);cctx.translate(c.x,c.y);cctx.rotate(c.rot*Math.PI/180);cctx.fillStyle=c.color;cctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);cctx.restore();c.y+=c.speed;c.x+=c.drift;c.rot+=c.rotSpeed;if(c.y>confettiCanvas.height*0.7)c.opacity-=0.02});if(allOut)confettiDone=true;requestAnimationFrame(drawConfetti)}drawConfetti();/* ===== 时钟显示 ===== */var clock=document.createElement('div');clock.style.cssText='position:fixed;top:10px;right:16px;font-size:18px;color:#0969da;font-weight:bold;z-index:9998;background:rgba(255,255,255,0.85);padding:2px 10px;border-radius:20px;box-shadow:0 1px 6px rgba(0,0,0,0.1);font-family:monospace;pointer-events:none';document.body.appendChild(clock);function updateClock(){var now=new Date();var h=String(now.getHours()).padStart(2,'0');var mi=String(now.getMinutes()).padStart(2,'0');var s=String(now.getSeconds()).padStart(2,'0');clock.textContent=h+':'+mi+':'+s}updateClock();setInterval(updateClock,1000)});</script>

</html>
